name: Deploy to Cloudflare (Alchemy)

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Diagnose Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "== token length =="; echo -n "$CLOUDFLARE_API_TOKEN" | wc -c
          echo "== verify token =="
          curl -s https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          echo ""
          echo "== D1 list (cuenta configurada en el secret) =="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 400
          echo ""
          echo "== cuentas a las que el token tiene acceso =="
          curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 600
          echo ""
          echo "== D1 en cuenta darwin (39f3db3a...) =="
          curl -s "https://api.cloudflare.com/client/v4/accounts/39f3db3a2ce79188fddf0cb83e72f8be/d1/database" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 300
          echo ""
          echo "== D1 en cuenta smartperu (9bea4537...) =="
          curl -s "https://api.cloudflare.com/client/v4/accounts/9bea4537335b85134cfebbcb8bda5883/d1/database" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | head -c 300
          echo ""
      - name: Deploy with Alchemy
        run: npm run deploy
        env:
          # Credenciales de Cloudflare que necesita Alchemy
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Variables de la aplicación (las consume alchemy.run.ts vía process.env)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          GOOGLE_ALERT_RSS_URL: ${{ secrets.GOOGLE_ALERT_RSS_URL }}
