name: Deploy to Cloudflare (Alchemy)

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Deploy with Alchemy
        run: npm run deploy
        env:
          # Credenciales de Cloudflare que necesita Alchemy
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Contraseña con la que Alchemy cifra los secrets en su estado
          ALCHEMY_PASSWORD: ${{ secrets.ALCHEMY_PASSWORD }}
          # Variables de la aplicación (las consume alchemy.run.ts vía process.env)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          GOOGLE_ALERT_RSS_URL: ${{ secrets.GOOGLE_ALERT_RSS_URL }}
